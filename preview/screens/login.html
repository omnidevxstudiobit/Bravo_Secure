<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: { "primary": "#2563EB", "background-dark": "#0A0F1E", "neutral-dark": "#0D1929" },
        fontFamily: { "display": ["Manrope", "sans-serif"] },
        borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
      },
    },
  }
</script>
<style>
  body { font-family: 'Manrope', sans-serif; height: 100dvh; overflow: hidden; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="bg-background-dark text-slate-100 min-h-screen flex flex-col font-display">
<main class="flex-1 flex flex-col max-w-[480px] mx-auto w-full px-6">
  <div class="pt-20 pb-10 flex flex-col items-center">
    <div class="w-10 h-10 bg-primary flex items-center justify-center rounded-lg mb-6 shadow-lg shadow-primary/20">
      <span class="material-symbols-outlined text-[#0A0F1E] text-[28px]">shield</span>
    </div>
    <h1 class="text-3xl font-bold tracking-tight text-slate-100">Welcome back</h1>
  </div>
  <div class="flex border-b border-primary/10 mb-8">
    <button class="flex-1 pb-3 text-sm font-bold border-b-2 border-primary text-primary">Phone</button>
    <button class="flex-1 pb-3 text-sm font-bold border-b-2 border-transparent text-slate-500 hover:text-slate-300">Email</button>
  </div>
  <div class="flex flex-col gap-4">
    <div class="flex gap-3">
      <div class="w-24 h-14 bg-neutral-dark rounded-xl flex items-center justify-center gap-2 border border-primary/5">
        <div class="w-6 h-4 rounded-sm overflow-hidden bg-cover bg-center" style="background-image: url('https://flagcdn.com/w40/ae.png');"></div>
        <span class="text-slate-100 text-sm font-medium">+971</span>
      </div>
      <div class="flex-1">
        <input class="w-full h-14 bg-neutral-dark rounded-xl border-none focus:ring-1 focus:ring-primary text-slate-100 placeholder:text-slate-600 px-4" placeholder="Mobile number" type="tel"/>
      </div>
    </div>
    <button class="mt-4 w-full h-14 bg-primary hover:bg-primary/90 text-[#0A0F1E] font-bold rounded-xl shadow-lg shadow-primary/10 flex items-center justify-center">
      Continue
    </button>
    <button class="mt-4 text-slate-500 text-sm font-medium hover:text-primary text-center w-full">
      Sign in differently
    </button>
  </div>
  <div class="mt-auto pb-12 flex flex-col items-center gap-2">
    <span class="material-symbols-outlined text-primary text-[20px]">lock</span>
    <p class="text-slate-500 text-xs text-center leading-relaxed">All communications protected by<br/>Signal Protocol</p>
  </div>
</main>
</body></html>
