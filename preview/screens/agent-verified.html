<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode:"class",
    theme:{ extend:{
      colors:{ "primary":"#7C3AED","background-dark":"#0A0F1E" },
      fontFamily:{ "display":["Manrope","sans-serif"] },
      borderRadius:{ "DEFAULT":"0.5rem","lg":"1rem","xl":"1.5rem","full":"9999px" }
    }}
  }
</script>
<style>
  body { font-family:'Manrope',sans-serif; height:100dvh; overflow:hidden; }
  main::-webkit-scrollbar { display:none; } main { scrollbar-width:none; }
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
  .filled { font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24; }

  /* Ripple rings */
  @keyframes ripple { 0%{transform:scale(1);opacity:0.5} 100%{transform:scale(2.8);opacity:0} }
  .r1{animation:ripple 2.4s ease-out infinite;}
  .r2{animation:ripple 2.4s ease-out infinite;animation-delay:0.6s;}
  .r3{animation:ripple 2.4s ease-out infinite;animation-delay:1.2s;}

  /* Check bounce */
  @keyframes check-bounce {
    0%{transform:scale(0);opacity:0} 55%{transform:scale(1.25);opacity:1} 75%{transform:scale(0.9)} 100%{transform:scale(1)}
  }
  .check-bounce { animation:check-bounce 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.3s both; }

  /* Fade up stagger */
  @keyframes fade-up { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .fu1{animation:fade-up 0.5s ease 0.8s both;}
  .fu2{animation:fade-up 0.5s ease 1s both;}
  .fu3{animation:fade-up 0.5s ease 1.2s both;}
  .fu4{animation:fade-up 0.5s ease 1.4s both;}
  .fu5{animation:fade-up 0.5s ease 1.6s both;}

  /* Spin ring */
  @keyframes slow-spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .spin-ring { animation:slow-spin 12s linear infinite; }
</style>
</head>
<body class="bg-background-dark font-display text-slate-100 h-screen flex flex-col">

<main class="flex-1 overflow-y-auto">
  <div class="flex flex-col items-center px-5 pt-[60px] pb-32 text-center">

    <!-- Icon -->
    <div class="relative flex items-center justify-center mb-8">
      <div class="r1 absolute size-32 rounded-full" style="border:2px solid rgba(124,58,237,0.3)"></div>
      <div class="r2 absolute size-32 rounded-full" style="border:2px solid rgba(124,58,237,0.2)"></div>
      <div class="r3 absolute size-32 rounded-full" style="border:2px solid rgba(124,58,237,0.1)"></div>
      <!-- Spin ring -->
      <svg class="spin-ring absolute" width="110" height="110" viewBox="0 0 110 110">
        <circle cx="55" cy="55" r="52" fill="none" stroke="rgba(124,58,237,0.2)" stroke-width="1.5" stroke-dasharray="8 6"/>
      </svg>
      <div class="size-24 rounded-full flex items-center justify-center check-bounce" style="background:linear-gradient(135deg,#7C3AED,#6D28D9);box-shadow:0 0 40px rgba(124,58,237,0.5)">
        <span class="material-symbols-outlined filled text-white" style="font-size:44px">check</span>
      </div>
    </div>

    <!-- Title -->
    <h1 class="fu1 text-2xl font-extrabold mb-2 leading-tight">You're Live on Bravo Secure!</h1>
    <p class="fu2 text-sm text-slate-400 leading-relaxed mb-3">Your account is verified and active. You can now receive job assignments.</p>

    <!-- Activated badge -->
    <div class="fu3 inline-flex items-center gap-2 px-4 py-2 rounded-full mb-8" style="background:rgba(212,175,55,0.1);border:1px solid rgba(212,175,55,0.3)">
      <span class="material-symbols-outlined filled" style="color:#D4AF37;font-size:16px">verified</span>
      <span class="text-xs font-bold uppercase tracking-widest" style="color:#D4AF37">Activated: 16 March 2026</span>
    </div>

    <!-- Stats row -->
    <div class="fu3 grid grid-cols-3 gap-3 w-full mb-6">
      <div class="p-3 rounded-xl text-center" style="background:#0D1929;border:1px solid #1E2D45">
        <p class="text-lg font-extrabold" style="color:#a78bfa">0</p>
        <p class="text-[9px] uppercase tracking-widest text-slate-500 font-bold mt-0.5">Jobs</p>
      </div>
      <div class="p-3 rounded-xl text-center" style="background:#0D1929;border:1px solid #1E2D45">
        <p class="text-lg font-extrabold" style="color:#a78bfa">—</p>
        <p class="text-[9px] uppercase tracking-widest text-slate-500 font-bold mt-0.5">Rating</p>
      </div>
      <div class="p-3 rounded-xl text-center" style="background:#0D1929;border:1px solid #1E2D45">
        <p class="text-lg font-extrabold text-emerald-400">Live</p>
        <p class="text-[9px] uppercase tracking-widest text-slate-500 font-bold mt-0.5">Status</p>
      </div>
    </div>

    <!-- CTA buttons -->
    <div class="fu4 w-full space-y-3">
      <button onclick="goMarketplace()" class="w-full font-bold py-3 px-5 rounded-xl flex items-center justify-center gap-2 transition-all"
        style="background:linear-gradient(160deg,#9333ea,#7C3AED,#5b21b6);box-shadow:inset 0 1px 0 rgba(255,255,255,0.14),0 4px 16px rgba(124,58,237,0.32);color:white;letter-spacing:0.04em">
        <span class="material-symbols-outlined text-xl">trending_up</span>
        Go to Job Marketplace
      </button>
      <button class="w-full font-semibold py-2.5 px-5 rounded-xl transition-colors text-sm" style="color:#a78bfa;background:rgba(124,58,237,0.06);border:1px solid rgba(124,58,237,0.2)">
        View My Profile
      </button>
    </div>

    <!-- Security badge -->
    <div class="fu5 flex items-center gap-3 mt-8 p-3.5 rounded-xl w-full" style="background:#0D1929;border:1px solid #1E2D45">
      <span class="material-symbols-outlined filled text-slate-500" style="font-size:20px">shield_person</span>
      <div class="text-left">
        <p class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Identity Verified</p>
        <p class="text-[10px] text-slate-600 uppercase">Bank-grade encryption active</p>
      </div>
      <div class="ml-auto flex items-center gap-1">
        <span class="size-1.5 rounded-full bg-emerald-400 animate-pulse inline-block"></span>
        <span class="text-[10px] text-emerald-400 font-bold">ACTIVE</span>
      </div>
    </div>

  </div>
</main>

<!-- Bottom Nav -->
<nav class="fixed bottom-0 w-full border-t px-6 pb-5 pt-2 flex justify-around items-center z-50" style="background:#0A0F1E;border-color:#1E2D45">
  <button class="flex flex-col items-center gap-1 text-slate-600">
    <span class="material-symbols-outlined" style="font-size:22px">home</span>
    <span class="text-[10px] font-bold">Home</span>
  </button>
  <button onclick="goMarketplace()" class="flex flex-col items-center gap-1" style="color:#7C3AED">
    <span class="material-symbols-outlined filled" style="font-size:22px;color:#7C3AED">work</span>
    <span class="text-[10px] font-bold">Jobs</span>
  </button>
  <button class="flex flex-col items-center gap-1 text-slate-600">
    <span class="material-symbols-outlined" style="font-size:22px">person</span>
    <span class="text-[10px] font-bold">Profile</span>
  </button>
  <button class="flex flex-col items-center gap-1 text-slate-600">
    <span class="material-symbols-outlined" style="font-size:22px">settings</span>
    <span class="text-[10px] font-bold">Settings</span>
  </button>
</nav>

<script>
  function goMarketplace() {
    if(window.parent && window.parent.loadScreen){
      const nav = window.parent.document.querySelector('[onclick*="job-marketplace"]')||
                  window.parent.document.querySelector('.nav-item.active');
      window.parent.loadScreen('screens/job-marketplace.html', nav||document.createElement('div'));
    }
  }
</script>
</body></html>
