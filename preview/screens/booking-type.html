<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: { primary: "#2563EB", "bg-dark": "#0A0F1E", surface: "#0D1929", border: "#1E2D45" },
        fontFamily: { display: ["Manrope", "sans-serif"] },
      },
    },
  }
</script>
<style>
  *, *::before, *::after { scrollbar-width: none; -ms-overflow-style: none; }
  *::-webkit-scrollbar { display: none; }
  html, body { height: 100%; overflow: hidden; font-family: 'Manrope', sans-serif; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

  .card-selected {
    border-color: #2563EB !important;
    box-shadow: 0 0 0 1px #2563EB, 0 0 20px rgba(37,99,235,0.15);
  }
</style>
</head>
<body class="bg-bg-dark text-slate-100 h-screen flex flex-col">

<!-- Header -->
<header class="shrink-0 flex items-center justify-between px-4 border-b" style="padding-top:50px; padding-bottom:12px; background:#0A0F1E; border-color:#1E2D45;">
  <div class="flex items-center gap-3">
    <button onclick="goBack()" class="size-9 flex items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
      <span class="material-symbols-outlined text-slate-300" style="font-size:20px;">arrow_back</span>
    </button>
    <span class="text-[11px] font-bold uppercase tracking-[2px] text-slate-400">Booking Type</span>
  </div>
  <div></div>
</header>

<!-- Scrollable content -->
<main class="flex-1 overflow-y-auto px-4 py-5 space-y-5">

  <!-- Status card -->
  <div class="flex items-center gap-3 px-4 py-3 rounded-xl" style="background:#0D1929; border:1px solid #1E2D45;">
    <div class="size-10 rounded-[10px] flex items-center justify-center shrink-0" style="background:rgba(37,99,235,0.12); border:1px solid rgba(37,99,235,0.2);">
      <span class="material-symbols-outlined text-primary" style="font-size:20px;">tune</span>
    </div>
    <div>
      <p class="text-[10px] font-bold uppercase tracking-wider text-slate-500">Current Status</p>
      <p class="text-[13px] text-slate-400 italic">Building your booking...</p>
    </div>
  </div>

  <!-- Title -->
  <div>
    <h1 class="text-[26px] font-extrabold leading-tight">What type of<br/><span style="color:#60A5FA;">protection?</span></h1>
    <p class="text-slate-400 text-[13px] mt-1.5 leading-relaxed">Select the service model that fits your security requirements.</p>
  </div>

  <!-- Cards -->
  <div class="space-y-3">

    <!-- Transfer (selected) -->
    <button id="card-transfer" onclick="selectCard('transfer'); navigateToDetails()"
      class="w-full text-left rounded-2xl p-5 card-selected transition-all"
      style="background:#0D1929; border:2px solid #1E2D45;">
      <div class="flex justify-between items-start">
        <div class="size-12 rounded-xl flex items-center justify-center shrink-0" style="background:rgba(37,99,235,0.12); border:1px solid rgba(37,99,235,0.2);">
          <span class="material-symbols-outlined text-primary" style="font-size:24px;">location_on</span>
        </div>
        <div id="check-transfer" class="size-6 rounded-full flex items-center justify-center" style="background:#2563EB;">
          <span class="material-symbols-outlined filled text-white" style="font-size:14px;">check</span>
        </div>
      </div>
      <div class="mt-3">
        <h3 class="text-[17px] font-extrabold">Transfer</h3>
        <p class="text-slate-400 text-[12px] mt-1 leading-relaxed">Point-to-point secure transit. Ideal for airport runs or single events.</p>
      </div>
      <div class="mt-4 flex items-center gap-2">
        <span class="px-2.5 py-1 rounded-lg text-[11px] font-semibold text-slate-300" style="background:#1E2D45;">Under 1 hour</span>
        <span class="ml-auto font-extrabold text-[15px] text-primary">From $199</span>
      </div>
    </button>

    <!-- Time Slot -->
    <button id="card-timeslot" onclick="selectCard('timeslot'); navigateToDateTime()"
      class="w-full text-left rounded-2xl p-5 transition-all"
      style="background:#0D1929; border:2px solid #1E2D45;">
      <div class="flex justify-between items-start">
        <div class="size-12 rounded-xl flex items-center justify-center shrink-0" style="background:rgba(255,255,255,0.04); border:1px solid #1E2D45;">
          <span class="material-symbols-outlined text-slate-500" style="font-size:24px;">schedule</span>
        </div>
        <div id="check-timeslot" class="size-6 rounded-full hidden items-center justify-center" style="background:#2563EB;">
          <span class="material-symbols-outlined filled text-white" style="font-size:14px;">check</span>
        </div>
      </div>
      <div class="mt-3">
        <h3 class="text-[17px] font-extrabold text-slate-200">Time Slot</h3>
        <p class="text-slate-400 text-[12px] mt-1 leading-relaxed">Extended duration for multi-stop protection and concierge security.</p>
      </div>
      <div class="mt-4 flex items-center gap-2">
        <span class="px-2.5 py-1 rounded-lg text-[11px] font-semibold text-slate-300" style="background:#1E2D45;">1–24 hours</span>
        <span class="ml-auto font-extrabold text-[15px] text-slate-300">From $450</span>
      </div>
    </button>

  </div>

  <!-- Info banner -->
  <div class="flex items-start gap-3 px-4 py-3 rounded-xl" style="background:rgba(37,99,235,0.06); border:1px solid rgba(37,99,235,0.2);">
    <span class="material-symbols-outlined text-primary shrink-0 mt-0.5" style="font-size:18px;">schedule</span>
    <div>
      <p class="text-[12px] font-bold text-primary">Important Note</p>
      <p class="text-[12px] text-slate-400 mt-0.5 leading-snug">Minimum 3-hour lead time required for all immediate bookings.</p>
    </div>
  </div>

  <!-- Continue button -->
  <div class="pb-4">
    <button onclick="navigateToDetails()" class="w-full py-4 rounded-xl font-extrabold text-[14px] text-white tracking-wide transition-all active:scale-[0.98]"
      style="background:#2563EB; box-shadow:0 6px 20px rgba(37,99,235,0.35);">
      Continue to Details
    </button>
  </div>

</main>

<script>
  let selected = 'transfer';

  function selectCard(key) {
    const cards = ['transfer', 'timeslot'];
    cards.forEach(k => {
      const card  = document.getElementById('card-' + k);
      const check = document.getElementById('check-' + k);
      const icon  = card.querySelector('.material-symbols-outlined:first-child') ||
                    card.querySelector('.size-12 .material-symbols-outlined');

      if (k === key) {
        card.classList.add('card-selected');
        card.style.borderColor = '#2563EB';
        check.classList.remove('hidden');
        check.classList.add('flex');
      } else {
        card.classList.remove('card-selected');
        card.style.borderColor = '#1E2D45';
        check.classList.add('hidden');
        check.classList.remove('flex');
      }
    });
    selected = key;
  }

  function navigateToDateTime() {
    if (window.parent && window.parent.loadScreen) {
      const navItem = Array.from(window.parent.document.querySelectorAll('.nav-item'))
        .find(el => el.getAttribute('onclick') && el.getAttribute('onclick').includes('booking-datetime'));
      window.parent.loadScreen('screens/booking-datetime.html', navItem || window.parent.document.querySelector('.nav-item'));
    }
  }

  function navigateToDetails() {
    if (window.parent && window.parent.loadScreen) {
      const navItem = Array.from(window.parent.document.querySelectorAll('.nav-item'))
        .find(el => el.getAttribute('onclick') && el.getAttribute('onclick').includes('booking-details'));
      window.parent.loadScreen('screens/booking-details.html', navItem || window.parent.document.querySelector('.nav-item'));
    }
  }

  function goBack() {
    if (window.parent && window.parent.loadScreen) {
      const navItem = Array.from(window.parent.document.querySelectorAll('.nav-item'))
        .find(el => el.getAttribute('onclick') && el.getAttribute('onclick').includes('zone-map'));
      window.parent.loadScreen('screens/zone-map.html', navItem || window.parent.document.querySelector('.nav-item'));
    }
  }
</script>

</body></html>
