<!DOCTYPE html>
<html class="dark h-full" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: { primary: "#2563EB", "bg-dark": "#0A0F1E", surface: "#0D1929", border: "#1E2D45" },
        fontFamily: { display: ["Manrope", "sans-serif"] },
      },
    },
  }
</script>
<style>
  *, *::before, *::after { scrollbar-width: none; -ms-overflow-style: none; }
  *::-webkit-scrollbar { display: none; }
  html, body { height: 100%; overflow: hidden; font-family: 'Manrope', sans-serif; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

  .map-bg {
    background-color: #070B12;
    background-image:
      radial-gradient(circle at 25% 35%, rgba(37,99,235,0.07) 0%, transparent 55%),
      radial-gradient(circle at 70% 65%, rgba(37,99,235,0.05) 0%, transparent 50%),
      linear-gradient(rgba(37,99,235,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(37,99,235,0.025) 1px, transparent 1px);
    background-size: 100% 100%, 100% 100%, 36px 36px, 36px 36px;
  }

  /* Simulated road lines */
  .road-h { position: absolute; height: 1px; background: rgba(37,99,235,0.08); }
  .road-v { position: absolute; width: 1px;  background: rgba(37,99,235,0.08); }

  @keyframes pulse-user {
    0%   { transform: scale(0.9); box-shadow: 0 0 0 0   rgba(37,99,235,0.8); }
    70%  { transform: scale(1);   box-shadow: 0 0 0 14px rgba(37,99,235,0); }
    100% { transform: scale(0.9); box-shadow: 0 0 0 0   rgba(37,99,235,0); }
  }
  .user-pulse { animation: pulse-user 2s infinite; }

  @keyframes zone-breathe {
    0%,100% { opacity: 0.55; }
    50%     { opacity: 0.8;  }
  }
  .zone-breathe { animation: zone-breathe 3s ease-in-out infinite; }

  /* Bottom sheet drag handle */
  .sheet-handle { width: 40px; height: 4px; border-radius: 9999px; background: rgba(37,99,235,0.3); margin: 0 auto 14px; }

  .nav-tab { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; }
  .nav-tab span { font-size: 10px; font-weight: 500; }
  .nav-tab .material-symbols-outlined { font-size: 22px; }
</style>
</head>
<body class="text-slate-100 h-screen flex flex-col overflow-hidden" style="font-family:'Manrope',sans-serif;">

<!-- Top bar -->
<div id="top-bar" class="shrink-0 z-50 map-bg px-4" style="padding-top:50px; padding-bottom:10px;">

  <!-- Default: search icon + location icon -->
  <div id="bar-collapsed" class="flex items-center justify-between gap-3">
    <button onclick="openSearch()"
      class="size-11 rounded-[14px] flex items-center justify-center shrink-0"
      style="background:#0D1929; border:1px solid #1E2D45;">
      <span class="material-symbols-outlined text-slate-400" style="font-size:20px;">search</span>
    </button>
    <button id="location-btn"
      class="size-11 rounded-[14px] flex items-center justify-center shrink-0"
      style="background:#0D1929; border:1px solid #1E2D45;">
      <span class="material-symbols-outlined text-primary" style="font-size:20px;">my_location</span>
    </button>
  </div>

  <!-- Expanded: single search bar (hidden by default) -->
  <div id="bar-expanded" class="hidden">
    <div class="flex items-center gap-3 h-11 px-3 rounded-[14px]"
      style="background:#0D1929; border:1px solid #2563EB;">
      <button onclick="closeSearch()" class="shrink-0">
        <span class="material-symbols-outlined text-slate-400" style="font-size:18px;">arrow_back</span>
      </button>
      <input id="to-input" class="flex-1 bg-transparent text-[13px] text-slate-100 placeholder:text-slate-500 focus:outline-none border-none min-w-0"
        placeholder="Where do you need protection?" type="text"/>
    </div>
  </div>

</div>

<!-- Map Layer -->
<main class="relative flex-1 map-bg overflow-hidden">

  <!-- Simulated road lines -->
  <div class="road-h" style="top:32%; left:0; right:0;"></div>
  <div class="road-h" style="top:55%; left:0; right:0;"></div>
  <div class="road-h" style="top:72%; left:0; right:0;"></div>
  <div class="road-v" style="left:25%; top:0; bottom:0;"></div>
  <div class="road-v" style="left:60%; top:0; bottom:0;"></div>

  <!-- Coverage zones -->
  <!-- UK -->
  <div class="zone-breathe absolute rounded-full blur-2xl"
    style="top:12%; left:8%; width:110px; height:130px; background:rgba(37,99,235,0.12); transform:rotate(12deg);"></div>
  <!-- South Africa -->
  <div class="zone-breathe absolute rounded-full blur-2xl"
    style="bottom:32%; left:22%; width:130px; height:120px; background:rgba(37,99,235,0.1);" ></div>
  <!-- UAE -->
  <div class="zone-breathe absolute rounded-[40%] blur-2xl"
    style="top:28%; right:18%; width:150px; height:100px; background:rgba(37,99,235,0.12); transform:rotate(-10deg);"></div>

  <!-- Zone label badges -->
  <div class="absolute flex items-center gap-1 px-2 py-1 rounded-full text-[9px] font-bold uppercase tracking-wider"
    style="top:14%; left:6%; background:rgba(37,99,235,0.2); border:1px solid rgba(37,99,235,0.35); color:#93C5FD;">
    <span class="material-symbols-outlined filled" style="font-size:10px;">shield</span> UK
  </div>
  <div class="absolute flex items-center gap-1 px-2 py-1 rounded-full text-[9px] font-bold uppercase tracking-wider"
    style="bottom:40%; left:20%; background:rgba(37,99,235,0.2); border:1px solid rgba(37,99,235,0.35); color:#93C5FD;">
    <span class="material-symbols-outlined filled" style="font-size:10px;">shield</span> ZA
  </div>
  <div class="absolute flex items-center gap-1 px-2 py-1 rounded-full text-[9px] font-bold uppercase tracking-wider"
    style="top:30%; right:16%; background:rgba(37,99,235,0.2); border:1px solid rgba(37,99,235,0.35); color:#93C5FD;">
    <span class="material-symbols-outlined filled" style="font-size:10px;">shield</span> UAE
  </div>

  <!-- User location -->
  <div class="absolute" style="top:50%; left:50%; transform:translate(-50%,-50%);">
    <!-- Outer glow -->
    <div class="absolute inset-0 rounded-full" style="width:72px; height:72px; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(37,99,235,0.08);"></div>
    <!-- Pulse dot -->
    <div class="user-pulse relative z-10 rounded-full border-2 border-white"
      style="width:16px; height:16px; background:#2563EB;"></div>
  </div>

  <!-- Map controls (zoom + layers stacked on right) -->
  <div class="absolute right-3 flex flex-col gap-2 z-40" style="bottom:20px;">
    <button class="size-8 rounded-[8px] flex items-center justify-center"
      style="background:#0D1929; border:1px solid #1E2D45;">
      <span class="material-symbols-outlined text-slate-300" style="font-size:16px;">layers</span>
    </button>
    <button class="size-8 rounded-[8px] flex items-center justify-center"
      style="background:#0D1929; border:1px solid #1E2D45;">
      <span class="material-symbols-outlined text-slate-300" style="font-size:16px;">add</span>
    </button>
    <button class="size-8 rounded-[8px] flex items-center justify-center"
      style="background:#0D1929; border:1px solid #1E2D45;">
      <span class="material-symbols-outlined text-slate-300" style="font-size:16px;">remove</span>
    </button>
  </div>

</main>

<!-- Bottom Sheet -->
<section class="shrink-0 px-4 pt-3 pb-4 shadow-[0_-10px_30px_rgba(0,0,0,0.5)]"
  style="background:#0D1929; border-top:1px solid #1E2D45;">
  <div class="sheet-handle"></div>
  <div class="flex items-center justify-between gap-3">
    <div class="flex-1 min-w-0">
      <div class="flex items-center gap-2 mb-0.5">
        <h3 class="text-[15px] font-extrabold text-slate-100 whitespace-nowrap">Book Security Now</h3>
      </div>
      <p class="text-[10px] font-semibold uppercase tracking-wider mb-1.5" style="color:#60A5FA;">Min. 3-hour lead time</p>
      <div class="flex gap-1.5">
        <span class="text-[10px] font-bold px-2 py-0.5 rounded-full" style="background:rgba(37,99,235,0.15); border:1px solid rgba(37,99,235,0.25); color:#93C5FD;">🇬🇧 UK</span>
        <span class="text-[10px] font-bold px-2 py-0.5 rounded-full" style="background:rgba(37,99,235,0.15); border:1px solid rgba(37,99,235,0.25); color:#93C5FD;">🇿🇦 ZA</span>
        <span class="text-[10px] font-bold px-2 py-0.5 rounded-full" style="background:rgba(37,99,235,0.15); border:1px solid rgba(37,99,235,0.25); color:#93C5FD;">🇦🇪 UAE</span>
      </div>
    </div>
    <button onclick="startBooking()" class="font-bold px-4 py-2.5 rounded-xl text-white text-[13px] shrink-0 active:scale-95 transition-transform"
      style="background:#2563EB; box-shadow:0 6px 20px rgba(37,99,235,0.4);">
      Start Booking
    </button>
  </div>
</section>

<!-- Bottom Nav -->
<nav class="shrink-0 flex items-center justify-around px-4 border-t"
  style="height:60px; background:#0A0F1E; border-color:#1E2D45;">

  <div class="nav-tab text-slate-500">
    <span class="material-symbols-outlined" style="font-size:20px;">home</span>
    <span>Home</span>
  </div>

  <div class="nav-tab" style="color:#2563EB;">
    <span class="material-symbols-outlined filled" style="font-size:20px;">calendar_month</span>
    <span style="font-weight:700;">Bookings</span>
  </div>

  <div class="nav-tab text-slate-500">
    <span class="material-symbols-outlined" style="font-size:20px;">headset_mic</span>
    <span>Support</span>
  </div>

  <div class="nav-tab text-slate-500">
    <span class="material-symbols-outlined" style="font-size:20px;">person</span>
    <span>Profile</span>
  </div>

</nav>

<script>
  function openSearch() {
    document.getElementById('bar-collapsed').classList.add('hidden');
    document.getElementById('bar-expanded').classList.remove('hidden');
    setTimeout(() => document.getElementById('to-input').focus(), 100);
  }

  function startBooking() {
    if (window.parent && window.parent.loadScreen) {
      const navItem = Array.from(window.parent.document.querySelectorAll('.nav-item'))
        .find(el => el.getAttribute('onclick') && el.getAttribute('onclick').includes('booking-type'));
      window.parent.loadScreen('screens/booking-type.html', navItem || window.parent.document.querySelector('.nav-item'));
    }
  }

  function closeSearch() {
    document.getElementById('bar-expanded').classList.add('hidden');
    document.getElementById('bar-collapsed').classList.remove('hidden');
    document.getElementById('to-input').value = '';
  }
</script>
</body></html>
