<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: { primary: "#2563EB", "background-dark": "#0A0F1E" },
        fontFamily: { display: ["Manrope", "sans-serif"] },
        borderRadius: { DEFAULT: "0.5rem", lg: "1rem", xl: "1.5rem", full: "9999px" },
      },
    },
  }
</script>
<style>
  *, *::before, *::after { scrollbar-width: none; -ms-overflow-style: none; }
  *::-webkit-scrollbar { display: none; }
  body { font-family: 'Manrope', sans-serif; height: 100dvh; overflow: hidden; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

  .otp-box {
    flex: 1; min-width: 0; max-width: 48px; height: 52px;
    text-align: center; font-size: 18px; font-weight: 800;
    border-radius: 10px; color: #f1f5f9; outline: none;
    font-family: 'Manrope', sans-serif;
    transition: border-color 0.12s, box-shadow 0.12s;
  }
  .otp-box.error { border-width: 2px !important; border-color: #FF3B3B !important; box-shadow: 0 0 0 2px rgba(255,59,59,0.15) !important; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-5px); }
    40% { transform: translateX(5px); }
    60% { transform: translateX(-3px); }
    80% { transform: translateX(3px); }
  }
  .shake { animation: shake 0.35s ease; }
</style>
</head>
<body class="bg-background-dark font-display text-slate-100 h-screen flex flex-col">

  <!-- Header -->
  <header class="flex items-center px-4 pb-2" style="padding-top:50px;">
    <button onclick="goBack()" class="flex items-center justify-center size-10 rounded-full hover:bg-primary/10 transition-colors">
      <span class="material-symbols-outlined text-slate-100">arrow_back</span>
    </button>
  </header>

  <!-- Main -->
  <main class="flex-1 px-5 pb-6 flex flex-col overflow-y-auto">

    <!-- Heading -->
    <h1 class="text-2xl font-bold leading-tight mb-1">Verify your identity</h1>
    <p class="text-slate-400 text-sm leading-normal mb-5">
      Enter the 6-digit codes sent to your email and phone number.
    </p>

    <!-- EMAIL OTP -->
    <div class="mb-1">
      <div class="flex items-center gap-1.5 mb-2">
        <span class="material-symbols-outlined text-primary" style="font-size:15px;">mail</span>
        <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Email OTP</span>
        <span class="text-xs text-slate-500 ml-1">· you@example.com</span>
      </div>
      <div id="email-row" class="flex gap-2" style="justify-content:space-between;">
        <input class="otp-box bg-slate-900 border-2 border-primary focus:outline-none focus:ring-2 focus:ring-primary/50" id="e0" maxlength="1" type="text" inputmode="numeric" placeholder="·" oninput="onBox('e',0)" onkeydown="onKey(event,'e',0)"/>
        <input class="otp-box bg-slate-900 border border-slate-800 focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/50" id="e1" maxlength="1" type="text" inputmode="numeric" placeholder="·" oninput="onBox('e',1)" onkeydown="onKey(event,'e',1)"/>
        <input class="otp-box bg-slate-900 border border-slate-800 focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/50" id="e2" maxlength="1" type="text" inputmode="numeric" placeholder="·" oninput="onBox('e',2)" onkeydown="onKey(event,'e',2)"/>
        <input class="otp-box bg-slate-900 border border-slate-800 focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/50" id="e3" maxlength="1" type="text" inputmode="numeric" placeholder="·" oninput="onBox('e',3)" onkeydown="onKey(event,'e',3)"/>
        <input class="otp-box bg-slate-900 border border-slate-800 focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/50" id="e4" maxlength="1" type="text" inputmode="numeric" placeholder="·" oninput="onBox('e',4)" onkeydown="onKey(event,'e',4)"/>
        <input class="otp-box bg-slate-900 border border-slate-800 focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/50" id="e5" maxlength="1" type="text" inputmode="numeric" placeholder="·" oninput="onBox('e',5)" onkeydown="onKey(event,'e',5)"/>
      </div>
      <div id="email-error" class="text-xs text-red-400 font-semibold h-4 mt-1"></div>
    </div>

    <!-- PHONE OTP -->
    <div class="mb-4">
      <div class="flex items-center gap-1.5 mb-2">
        <span class="material-symbols-outlined text-primary" style="font-size:15px;">phone</span>
        <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Phone OTP</span>
        <span class="text-xs text-slate-500 ml-1">· +1 ••• ••• 1234</span>
      </div>
      <div id="phone-row" class="flex gap-2" style="justify-content:space-between;">
        <input class="otp-box bg-slate-900 border-2 border-slate-800 focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/50" id="p0" maxlength="1" type="text" inputmode="numeric" placeholder="·" oninput="onBox('p',0)" onkeydown="onKey(event,'p',0)"/>
        <input class="otp-box bg-slate-900 border border-slate-800 focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/50" id="p1" maxlength="1" type="text" inputmode="numeric" placeholder="·" oninput="onBox('p',1)" onkeydown="onKey(event,'p',1)"/>
        <input class="otp-box bg-slate-900 border border-slate-800 focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/50" id="p2" maxlength="1" type="text" inputmode="numeric" placeholder="·" oninput="onBox('p',2)" onkeydown="onKey(event,'p',2)"/>
        <input class="otp-box bg-slate-900 border border-slate-800 focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/50" id="p3" maxlength="1" type="text" inputmode="numeric" placeholder="·" oninput="onBox('p',3)" onkeydown="onKey(event,'p',3)"/>
        <input class="otp-box bg-slate-900 border border-slate-800 focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/50" id="p4" maxlength="1" type="text" inputmode="numeric" placeholder="·" oninput="onBox('p',4)" onkeydown="onKey(event,'p',4)"/>
        <input class="otp-box bg-slate-900 border border-slate-800 focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/50" id="p5" maxlength="1" type="text" inputmode="numeric" placeholder="·" oninput="onBox('p',5)" onkeydown="onKey(event,'p',5)"/>
      </div>
      <div id="phone-error" class="text-xs text-red-400 font-semibold h-4 mt-1"></div>
    </div>

    <!-- Resend -->
    <div class="text-center mb-4">
      <p class="text-slate-400 text-sm">
        <span id="resend-label">Resend codes in <span class="text-primary font-bold">0:<span id="countdown">45</span></span></span>
        <button id="resend-btn" class="text-primary font-bold hidden" onclick="startResend()">Resend codes</button>
      </p>
    </div>

    <!-- Verify button -->
    <div class="mt-auto">
      <button onclick="verify()" class="w-full bg-primary text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 hover:bg-primary/90 active:scale-[0.98] transition-all">
        Verify & Continue
      </button>
    </div>

  </main>

<script>
  const DEMO = '123456';

  window.onload = () => {
    document.getElementById('e0').focus();
    startCountdown(45);
  };

  function startCountdown(secs) {
    let t = secs;
    document.getElementById('resend-label').classList.remove('hidden');
    document.getElementById('resend-btn').classList.add('hidden');
    document.getElementById('countdown').textContent = t < 10 ? '0'+t : t;
    const iv = setInterval(() => {
      t--;
      document.getElementById('countdown').textContent = t < 10 ? '0'+t : t;
      if (t <= 0) {
        clearInterval(iv);
        document.getElementById('resend-label').classList.add('hidden');
        document.getElementById('resend-btn').classList.remove('hidden');
      }
    }, 1000);
  }

  function startResend() { startCountdown(30); }

  function onBox(prefix, i) {
    const box = document.getElementById(prefix + i);
    box.value = box.value.replace(/\D/g, '').slice(-1);
    if (box.value && i < 5) document.getElementById(prefix + (i+1)).focus();
  }

  function onKey(e, prefix, i) {
    if (e.key === 'Backspace' && !document.getElementById(prefix+i).value && i > 0)
      document.getElementById(prefix+(i-1)).focus();
  }

  function getCode(prefix) {
    return [0,1,2,3,4,5].map(i => document.getElementById(prefix+i).value).join('');
  }

  function shakeRow(rowId, errorId, msg) {
    const row = document.getElementById(rowId);
    [0,1,2,3,4,5].forEach(i => document.getElementById(rowId.replace('-row','')[0] + i).classList.add('error'));
    row.classList.add('shake');
    document.getElementById(errorId).textContent = msg;
    setTimeout(() => {
      row.classList.remove('shake');
      [0,1,2,3,4,5].forEach(i => {
        const prefix = rowId.replace('-row','')[0];
        document.getElementById(prefix+i).value = '';
        document.getElementById(prefix+i).classList.remove('error');
      });
      document.getElementById(errorId).textContent = '';
    }, 500);
  }

  function verify() {
    const emailCode = getCode('e');
    const phoneCode = getCode('p');
    let ok = true;

    if (emailCode !== DEMO) {
      shakeRow('email-row', 'email-error', 'Incorrect email OTP.');
      ok = false;
    }
    if (phoneCode !== DEMO) {
      shakeRow('phone-row', 'phone-error', 'Incorrect phone OTP.');
      ok = false;
    }
    if (ok) navigate('screens/vault-new-pin.html');
  }

  function navigate(src) {
    if (window.parent && window.parent.loadScreen) {
      const navItem = Array.from(window.parent.document.querySelectorAll('.nav-item'))
        .find(el => el.getAttribute('onclick') && el.getAttribute('onclick').includes(src.replace('screens/','')));
      window.parent.loadScreen(src, navItem || window.parent.document.querySelector('.nav-item'));
    }
  }

  function goBack() { navigate('screens/vault-forgot.html'); }
</script>

</body>
</html>
