<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: { "primary": "#2563EB", "background-dark": "#0A0F1E" },
        fontFamily: { "display": ["Manrope", "sans-serif"] },
        borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
      },
    },
  }
</script>
<style>
  body { font-family: 'Manrope', sans-serif; height: 100dvh; overflow: hidden; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="bg-background-dark font-display text-slate-100 h-screen flex flex-col">

  <!-- Header -->
  <header class="flex items-center justify-between p-4">
    <div class="flex items-center gap-4">
      <button class="flex items-center justify-center size-10 rounded-full hover:bg-slate-800 transition-colors">
        <span class="material-symbols-outlined text-slate-100">arrow_back</span>
      </button>
      <h2 class="text-lg font-bold tracking-tight">Verify</h2>
    </div>
    <div class="size-10"></div>
  </header>

  <!-- Progress -->
  <div class="px-6 mb-4">
    <span class="text-xs font-medium text-primary block mb-1.5">Step 1 of 4</span>
    <div class="h-1 w-full bg-slate-800 rounded-full overflow-hidden">
      <div class="h-full bg-primary rounded-full w-1/4"></div>
    </div>
  </div>

  <!-- Content -->
  <main class="flex-1 px-6 pt-4 flex flex-col">
    <h1 class="text-3xl font-bold leading-tight mb-2">Verify your number</h1>
    <p class="text-slate-400 text-base leading-normal mb-8">
      We sent a 6-digit code to <span class="text-slate-100 font-medium">+971 50 *** 1234</span>
    </p>

    <!-- OTP inputs -->
    <div class="flex justify-between gap-2 mb-8">
      <input autofocus class="w-12 h-14 text-center text-xl font-bold bg-slate-900 border-2 border-primary rounded-lg focus:outline-none" maxlength="1" type="text" value="4"/>
      <input class="w-12 h-14 text-center text-xl font-bold bg-slate-900 border border-slate-800 rounded-lg focus:border-primary focus:outline-none" maxlength="1" placeholder="·" type="text"/>
      <input class="w-12 h-14 text-center text-xl font-bold bg-slate-900 border border-slate-800 rounded-lg focus:border-primary focus:outline-none" maxlength="1" placeholder="·" type="text"/>
      <input class="w-12 h-14 text-center text-xl font-bold bg-slate-900 border border-slate-800 rounded-lg focus:border-primary focus:outline-none" maxlength="1" placeholder="·" type="text"/>
      <input class="w-12 h-14 text-center text-xl font-bold bg-slate-900 border border-slate-800 rounded-lg focus:border-primary focus:outline-none" maxlength="1" placeholder="·" type="text"/>
      <input class="w-12 h-14 text-center text-xl font-bold bg-slate-900 border border-slate-800 rounded-lg focus:border-primary focus:outline-none" maxlength="1" placeholder="·" type="text"/>
    </div>

    <!-- Resend timer -->
    <div class="text-center mb-10">
      <p class="text-slate-400 text-sm">Resend code in <span class="text-primary font-bold">0:45</span></p>
    </div>

    <!-- Verify button -->
    <div class="mt-auto pb-10">
      <button class="w-full bg-primary text-[#0A0F1E] font-bold py-4 rounded-xl shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all">
        Verify
      </button>
    </div>
  </main>

  <div class="fixed bottom-0 left-0 right-0 h-1 bg-gradient-to-r from-transparent via-primary/20 to-transparent"></div>
</body></html>
