<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: { primary: "#2563EB", "background-dark": "#0A0F1E" },
        fontFamily: { display: ["Manrope", "sans-serif"] },
        borderRadius: { DEFAULT: "0.5rem", lg: "1rem", xl: "1.5rem", full: "9999px" },
      },
    },
  }
</script>
<style>
  *, *::before, *::after { scrollbar-width: none; -ms-overflow-style: none; }
  *::-webkit-scrollbar { display: none; }
  body { font-family: 'Manrope', sans-serif; height: 100dvh; overflow: hidden; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="bg-background-dark font-display text-slate-100 h-screen flex flex-col">

  <!-- Header -->
  <header class="flex items-center px-4 pb-2" style="padding-top:50px;">
    <button class="flex items-center justify-center size-10 rounded-full hover:bg-primary/10 transition-colors">
      <span class="material-symbols-outlined text-slate-100">arrow_back</span>
    </button>
  </header>

  <!-- Main -->
  <main class="flex-1 px-5 pb-8 flex flex-col overflow-hidden">

    <!-- Progress — same as role-selection -->
    <div class="mb-4">
      <span class="text-xs font-medium text-primary block mb-1.5">Step 1 of 4</span>
      <div class="h-1 w-full bg-slate-800 rounded-full overflow-hidden">
        <div class="h-full bg-primary rounded-full w-1/4"></div>
      </div>
    </div>

    <!-- Heading -->
    <h1 class="text-2xl font-bold leading-tight mb-1.5">Verify your number</h1>
    <p class="text-slate-400 text-sm leading-normal mb-6">
      We sent a 6-digit code to <span class="text-slate-100 font-medium">+971 50 *** 1234</span>
    </p>

    <!-- OTP inputs -->
    <div class="flex gap-2 mb-6" style="justify-content:space-between;">
      <input autofocus class="h-14 text-center text-xl font-bold bg-slate-900 border-2 border-primary rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50" style="flex:1;min-width:0;max-width:52px;" maxlength="1" type="text" inputmode="numeric"/>
      <input class="h-14 text-center text-xl font-bold bg-slate-900 border border-slate-800 rounded-lg focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/50" style="flex:1;min-width:0;max-width:52px;" maxlength="1" placeholder="·" type="text" inputmode="numeric"/>
      <input class="h-14 text-center text-xl font-bold bg-slate-900 border border-slate-800 rounded-lg focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/50" style="flex:1;min-width:0;max-width:52px;" maxlength="1" placeholder="·" type="text" inputmode="numeric"/>
      <input class="h-14 text-center text-xl font-bold bg-slate-900 border border-slate-800 rounded-lg focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/50" style="flex:1;min-width:0;max-width:52px;" maxlength="1" placeholder="·" type="text" inputmode="numeric"/>
      <input class="h-14 text-center text-xl font-bold bg-slate-900 border border-slate-800 rounded-lg focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/50" style="flex:1;min-width:0;max-width:52px;" maxlength="1" placeholder="·" type="text" inputmode="numeric"/>
      <input class="h-14 text-center text-xl font-bold bg-slate-900 border border-slate-800 rounded-lg focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/50" style="flex:1;min-width:0;max-width:52px;" maxlength="1" placeholder="·" type="text" inputmode="numeric"/>
    </div>

    <!-- Resend -->
    <div class="text-center mb-6">
      <p class="text-slate-400 text-sm">
        Resend code in <span class="text-primary font-bold">0:45</span>
      </p>
    </div>

    <!-- Verify button -->
    <div class="mt-auto">
      <button class="w-full bg-primary text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 hover:bg-primary/90 active:scale-[0.98] transition-all">
        Verify
      </button>
    </div>

  </main>

</body></html>
