<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Bravo Secure — Register</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          primary:    "#2563EB",
          "bg-dark":  "#0A0F1E",
          surface:    "#0D1929",
          border:     "#1E2D45",
          green:      "#00C851",
        },
        fontFamily: { display: ["Manrope", "sans-serif"] },
      },
    },
  }
</script>
<style>
  body { font-family: 'Manrope', sans-serif; height: 100dvh; overflow: hidden; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .scroll-area { overflow-y: auto; scrollbar-width: none; }
  .scroll-area::-webkit-scrollbar { display: none; }
  input::placeholder { color: #475569; }
  input:focus { outline: none; border-color: #2563EB; box-shadow: 0 0 0 1px #2563EB33; }
</style>
</head>
<body class="bg-bg-dark font-display text-slate-100 h-screen">
<div class="flex flex-col w-full h-full max-w-sm mx-auto">

  <!-- Scrollable content -->
  <div class="scroll-area flex-1 px-5 pt-2 pb-4">

    <!-- Back button -->
    <button class="flex size-9 items-center justify-center rounded-full bg-white/5 hover:bg-white/10 transition-colors mb-3">
      <span class="material-symbols-outlined text-slate-100 text-[18px]">arrow_back</span>
    </button>

    <!-- Header label -->
    <p class="text-[10px] font-bold tracking-[2.5px] uppercase text-blue-400 mb-2">
      Email Registration
    </p>

    <!-- Title -->
    <h1 class="text-[26px] font-extrabold leading-tight tracking-tight text-slate-100">Create Your</h1>
    <h1 class="text-[26px] font-extrabold leading-tight tracking-tight text-blue-400 mb-1">Secure Account</h1>
    <p class="text-slate-500 text-[12px] mb-5 leading-snug">All fields are end-to-end encrypted at rest.</p>

    <!-- Full Name -->
    <div class="mb-3">
      <label class="block text-[10px] font-bold tracking-[2px] uppercase text-blue-400 mb-1.5">
        Full Name
      </label>
      <input
        type="text"
        placeholder="John Doe"
        value="John Doe"
        class="w-full rounded-[12px] h-12 px-4 text-[14px] text-slate-100 font-medium"
        style="background:#0D1929; border:1px solid #1E2D45;"
      />
    </div>

    <!-- Email Address -->
    <div class="mb-3">
      <label class="block text-[10px] font-bold tracking-[2px] uppercase text-blue-400 mb-1.5">
        Email Address
      </label>
      <input
        type="email"
        placeholder="you@example.com"
        value="you@example.com"
        class="w-full rounded-[12px] h-12 px-4 text-[14px] text-slate-100 font-medium"
        style="background:#0D1929; border:1px solid #1E2D45;"
      />
    </div>

    <!-- Secure Password -->
    <div class="mb-2">
      <label class="block text-[10px] font-bold tracking-[2px] uppercase text-blue-400 mb-1.5">
        Secure Password
      </label>
      <div class="flex">
        <input
          id="pw-input"
          type="password"
          placeholder="••••••••••"
          value="Secure@Pass1!"
          oninput="updateStrength(this.value)"
          class="flex-1 rounded-l-[12px] h-12 px-4 text-[14px] text-slate-100 font-medium"
          style="background:#0D1929; border:1px solid #1E2D45; border-right:none;"
        />
        <button
          onclick="togglePw()"
          class="h-12 w-11 rounded-r-[12px] flex items-center justify-center"
          style="background:#0D1929; border:1px solid #1E2D45; border-left:none;">
          <span id="eye-icon" class="material-symbols-outlined text-slate-500 text-[17px]">visibility</span>
        </button>
      </div>
    </div>

    <!-- Password Strength -->
    <div class="flex items-center gap-2 mb-5">
      <span class="text-[9px] font-bold tracking-[1.5px] uppercase text-slate-500 shrink-0">Password Strength</span>
      <div class="flex gap-1 flex-1">
        <div id="bar1" class="h-[3px] flex-1 rounded-full" style="background:#1E2D45"></div>
        <div id="bar2" class="h-[3px] flex-1 rounded-full" style="background:#1E2D45"></div>
        <div id="bar3" class="h-[3px] flex-1 rounded-full" style="background:#1E2D45"></div>
        <div id="bar4" class="h-[3px] flex-1 rounded-full" style="background:#1E2D45"></div>
      </div>
      <span id="strength-label" class="text-[10px] font-extrabold tracking-[1px] shrink-0 text-green-400">STRONG</span>
    </div>

    <!-- Create Account button -->
    <button class="w-full h-13 py-3.5 rounded-[12px] font-extrabold text-[13px] tracking-[2px] uppercase text-white transition-all"
      style="background:#2563EB; box-shadow: 0 6px 24px rgba(37,99,235,0.4);">
      Create Account
    </button>

    <!-- Sign in link -->
    <div class="flex justify-center gap-1 mt-4">
      <span class="text-slate-500 text-[13px]">Already have an account?</span>
      <button class="text-blue-400 text-[13px] font-bold hover:text-blue-300 transition-colors">Sign In</button>
    </div>

  </div>
</div>

<script>
  const COLORS = { 1: '#FF3B3B', 2: '#FFB800', 3: '#60A5FA', 4: '#00C851' };
  const LABELS = { 1: 'WEAK', 2: 'FAIR', 3: 'GOOD', 4: 'STRONG' };
  const LABEL_COLORS = { 1: '#FF3B3B', 2: '#FFB800', 3: '#60A5FA', 4: '#00C851' };

  function getLevel(pw) {
    if (!pw) return 0;
    if (pw.length < 6) return 1;
    if (pw.length < 10) return 2;
    const hasUpper = /[A-Z]/.test(pw);
    const hasSpecial = /[^a-zA-Z0-9]/.test(pw);
    return (hasUpper && hasSpecial) ? 4 : 3;
  }

  function updateStrength(pw) {
    const level = getLevel(pw);
    const bars = [document.getElementById('bar1'), document.getElementById('bar2'),
                  document.getElementById('bar3'), document.getElementById('bar4')];
    bars.forEach((b, i) => {
      b.style.background = i < level ? COLORS[level] : '#1E2D45';
    });
    const label = document.getElementById('strength-label');
    if (level === 0) { label.textContent = ''; return; }
    label.textContent = LABELS[level];
    label.style.color = LABEL_COLORS[level];
  }

  function togglePw() {
    const input = document.getElementById('pw-input');
    const icon  = document.getElementById('eye-icon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.textContent = 'visibility_off';
    } else {
      input.type = 'password';
      icon.textContent = 'visibility';
    }
  }

  // Init with current value
  updateStrength(document.getElementById('pw-input').value);
</script>
</body>
</html>
