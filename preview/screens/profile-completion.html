<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: { "primary": "#2563EB", "background-dark": "#0A0F1E" },
        fontFamily: { "display": ["Manrope", "sans-serif"] },
        borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
      },
    },
  }
</script>
<style>
  body { font-family: 'Manrope', sans-serif; height: 100dvh; overflow: hidden; }
  main::-webkit-scrollbar { display: none; }
  main { scrollbar-width: none; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="bg-background-dark font-display text-slate-100 h-screen flex flex-col">

  <!-- Header -->
  <header class="flex items-center p-4">
    <button class="flex items-center justify-center size-10 rounded-full hover:bg-primary/10 transition-colors">
      <span class="material-symbols-outlined text-slate-100">arrow_back</span>
    </button>
  </header>

  <!-- Main -->
  <main class="flex-1 px-6 pb-28 overflow-y-auto">

    <!-- Progress -->
    <div class="mb-6">
      <span class="text-xs font-medium text-primary block mb-1.5">Step 4 of 4</span>
      <div class="h-1 w-full bg-slate-800 rounded-full overflow-hidden">
        <div class="h-full bg-primary rounded-full w-full"></div>
      </div>
    </div>

    <!-- Heading -->
    <div class="mb-6">
      <h1 class="text-2xl font-bold mb-1">Complete your profile</h1>
      <p class="text-slate-400 text-sm">Help us personalise your experience</p>
    </div>

    <!-- Avatar Upload -->
    <div class="flex flex-col items-center gap-3 mb-8">
      <div class="relative cursor-pointer group">
        <div class="size-24 rounded-full border-2 border-dashed border-primary flex flex-col items-center justify-center bg-primary/5 hover:bg-primary/10 transition-colors">
          <span class="material-symbols-outlined text-primary text-3xl">photo_camera</span>
        </div>
        <div class="absolute bottom-0 right-0 size-7 bg-primary rounded-full flex items-center justify-center shadow-lg">
          <span class="material-symbols-outlined text-white text-sm">add</span>
        </div>
      </div>
      <p class="text-primary text-sm font-semibold">Upload photo</p>
    </div>

    <!-- Form Fields -->
    <div class="flex flex-col gap-4">

      <!-- Full Name -->
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-medium text-slate-400 uppercase tracking-wider">Full name <span class="text-primary">*</span></label>
        <input
          class="w-full bg-slate-900/60 border border-slate-700 focus:border-primary rounded-xl h-14 px-4 text-slate-100 placeholder:text-slate-600 focus:outline-none focus:ring-1 focus:ring-primary/50 transition-all"
          placeholder="Enter your full name"
          type="text"/>
      </div>

      <!-- Company -->
      <div class="flex flex-col gap-1.5">
        <div class="flex items-center justify-between">
          <label class="text-xs font-medium text-slate-400 uppercase tracking-wider">Company / Organisation</label>
          <span class="text-[10px] font-bold uppercase tracking-widest text-primary/70 px-2 py-0.5 rounded bg-primary/10 border border-primary/20">Optional</span>
        </div>
        <input
          class="w-full bg-slate-900/60 border border-slate-700 focus:border-primary rounded-xl h-14 px-4 text-slate-100 placeholder:text-slate-600 focus:outline-none focus:ring-1 focus:ring-primary/50 transition-all"
          placeholder="Enter company name"
          type="text"/>
      </div>

      <!-- Nationality -->
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-medium text-slate-400 uppercase tracking-wider">Nationality</label>
        <button class="w-full bg-slate-900/60 border border-slate-700 hover:border-primary/50 rounded-xl h-14 px-4 flex items-center justify-between text-slate-100 transition-all group">
          <div class="flex items-center gap-3">
            <div class="w-6 h-4 rounded-sm overflow-hidden shrink-0">
              <div class="flex h-full">
                <div class="w-1/3 bg-green-600"></div>
                <div class="w-1/3 bg-white"></div>
                <div class="w-1/3 bg-black"></div>
              </div>
            </div>
            <span class="text-sm">United Arab Emirates</span>
          </div>
          <span class="material-symbols-outlined text-slate-500 group-hover:text-primary transition-colors text-xl">expand_more</span>
        </button>
      </div>

      <!-- Emergency Contact -->
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-medium text-slate-400 uppercase tracking-wider">Emergency contact <span class="text-primary">*</span></label>
        <div class="relative">
          <div class="absolute left-4 top-1/2 -translate-y-1/2 flex items-center gap-2 border-r border-slate-700 pr-3">
            <span class="text-slate-300 text-sm font-semibold">+971</span>
          </div>
          <input
            class="w-full bg-slate-900/60 border border-slate-700 focus:border-primary rounded-xl h-14 pl-20 pr-4 text-slate-100 placeholder:text-slate-600 focus:outline-none focus:ring-1 focus:ring-primary/50 transition-all"
            placeholder="50 000 0000"
            type="tel"/>
        </div>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-[#0A0F1E] via-[#0A0F1E] to-transparent flex flex-col gap-3">
    <button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 px-6 rounded-xl transition-colors shadow-lg shadow-primary/20">
      Complete Setup
    </button>
    <button class="w-full text-slate-500 hover:text-slate-300 font-medium text-sm py-2 transition-colors">
      Skip for now
    </button>
  </footer>

</body></html>
