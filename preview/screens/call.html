<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: { primary: "#2563EB", "bg-dark": "#0A0F1E", surface: "#0D1929", border: "#1E2D45" },
        fontFamily: { display: ["Manrope", "sans-serif"] },
      },
    },
  }
</script>
<style>
  *, *::before, *::after { scrollbar-width: none; -ms-overflow-style: none; }
  *::-webkit-scrollbar { display: none; }
  html, body { height: 100%; overflow: hidden; font-family: 'Manrope', sans-serif; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

  .bg-call-gradient {
    background: radial-gradient(ellipse at 50% 20%, rgba(37,99,235,0.15) 0%, #0A0F1E 65%);
  }

  @keyframes pulse-ring {
    0%   { transform: scale(1);    opacity: 0.5; }
    100% { transform: scale(1.6);  opacity: 0;   }
  }
  .pulse-ring  { animation: pulse-ring 2s ease-out infinite; }
  .pulse-ring2 { animation: pulse-ring 2s ease-out 0.7s infinite; }

  @keyframes bar {
    0%,100% { transform: scaleY(0.25); }
    50%     { transform: scaleY(1); }
  }
  .bar { transform-origin: bottom; animation: bar 1s ease-in-out infinite; }
  .bar:nth-child(1) { animation-delay: 0.00s; }
  .bar:nth-child(2) { animation-delay: 0.10s; }
  .bar:nth-child(3) { animation-delay: 0.20s; }
  .bar:nth-child(4) { animation-delay: 0.15s; }
  .bar:nth-child(5) { animation-delay: 0.05s; }
  .bar:nth-child(6) { animation-delay: 0.20s; }
  .bar:nth-child(7) { animation-delay: 0.10s; }
  .bar:nth-child(8) { animation-delay: 0.00s; }
  .bar:nth-child(9) { animation-delay: 0.15s; }

  .ctrl-circle {
    width: 64px; height: 64px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    cursor: pointer; transition: background 0.15s, transform 0.1s;
  }
  .ctrl-circle:active { transform: scale(0.93); }
  .ctrl-circle:hover  { background: rgba(255,255,255,0.1); }
  .ctrl-circle.active { background: rgba(37,99,235,0.2); border-color: rgba(37,99,235,0.45); }
</style>
</head>
<body class="bg-bg-dark text-slate-100 h-screen flex flex-col">

<div class="bg-call-gradient h-full flex flex-col justify-between overflow-hidden">

  <!-- Top: Identity -->
  <div class="flex flex-col items-center shrink-0" style="padding-top:56px;">

    <!-- Pulse rings + avatar -->
    <div class="relative flex items-center justify-center mb-5">
      <div class="absolute rounded-full pulse-ring"  style="width:110px; height:110px; border:1.5px solid rgba(37,99,235,0.4);"></div>
      <div class="absolute rounded-full pulse-ring2" style="width:110px; height:110px; border:1.5px solid rgba(37,99,235,0.2);"></div>
      <div class="relative z-10 size-[86px] rounded-full flex items-center justify-center text-[22px] font-extrabold text-white"
        style="background:linear-gradient(135deg,#1D4ED8,#7C3AED); box-shadow:0 0 0 3px rgba(37,99,235,0.3), 0 8px 32px rgba(37,99,235,0.3);">
        JV
      </div>
    </div>

    <!-- Name -->
    <h1 class="text-[26px] font-extrabold tracking-tight mb-2">Julian Vance</h1>

    <!-- Encrypted badge -->
    <div class="flex items-center gap-1.5 px-3 py-1 rounded-full mb-4" style="background:rgba(37,99,235,0.1); border:1px solid rgba(37,99,235,0.25);">
      <span class="material-symbols-outlined text-primary" style="font-size:13px;">lock</span>
      <span class="text-[10px] font-bold uppercase tracking-widest text-primary">End-to-End Encrypted</span>
    </div>

    <!-- Timer -->
    <p class="tabular-nums font-light" style="font-size:42px; color:rgba(241,245,249,0.9); letter-spacing:-1px;">00:02:34</p>
    <p class="text-[10px] font-semibold uppercase tracking-[3px] text-slate-500 mt-1">Secure Line Active</p>
  </div>

  <!-- Middle: Visualizer -->
  <div class="flex-1 flex items-center justify-center">
    <div class="flex gap-1.5 items-end" style="height:52px; opacity:0.35;">
      <div class="bar w-[5px] rounded-full bg-primary" style="height:28px;"></div>
      <div class="bar w-[5px] rounded-full bg-primary" style="height:44px;"></div>
      <div class="bar w-[5px] rounded-full bg-primary" style="height:52px;"></div>
      <div class="bar w-[5px] rounded-full bg-primary" style="height:44px;"></div>
      <div class="bar w-[5px] rounded-full bg-primary" style="height:34px;"></div>
      <div class="bar w-[5px] rounded-full bg-primary" style="height:52px;"></div>
      <div class="bar w-[5px] rounded-full bg-primary" style="height:38px;"></div>
      <div class="bar w-[5px] rounded-full bg-primary" style="height:44px;"></div>
      <div class="bar w-[5px] rounded-full bg-primary" style="height:28px;"></div>
    </div>
  </div>

  <!-- Bottom: Controls -->
  <div class="shrink-0 pb-12 px-4">
    <div class="flex justify-around items-end w-full">

      <div class="flex flex-col items-center gap-2">
        <button id="btn-mute" onclick="toggleBtn('mute','mic','mic_off')"
          class="ctrl-circle" style="width:58px;height:58px;">
          <span class="material-symbols-outlined text-slate-100" id="ico-mute" style="font-size:24px;">mic</span>
        </button>
        <span class="text-[11px] font-medium text-slate-400">Mute</span>
      </div>

      <div class="flex flex-col items-center gap-2">
        <button id="btn-speaker" onclick="toggleBtn('speaker','volume_up','volume_off')"
          class="ctrl-circle" style="width:58px;height:58px;">
          <span class="material-symbols-outlined text-slate-100" id="ico-speaker" style="font-size:24px;">volume_up</span>
        </button>
        <span class="text-[11px] font-medium text-slate-400">Speaker</span>
      </div>

      <div class="flex flex-col items-center gap-2">
        <button id="btn-video" onclick="toggleBtn('video','videocam','videocam_off')"
          class="ctrl-circle" style="width:58px;height:58px;">
          <span class="material-symbols-outlined text-slate-100" id="ico-video" style="font-size:24px;">videocam</span>
        </button>
        <span class="text-[11px] font-medium text-slate-400">Video</span>
      </div>

      <div class="flex flex-col items-center gap-2">
        <button onclick="goBack()" class="ctrl-circle"
          style="width:58px;height:58px;background:#CC3333;border-color:#992222;box-shadow:0 6px 20px rgba(204,51,51,0.45);">
          <span class="material-symbols-outlined text-white" style="font-size:26px;">call_end</span>
        </button>
        <span class="text-[11px] font-medium" style="color:#F87171;">End Call</span>
      </div>

    </div>
  </div>

  <!-- Protocol footer -->
  <p class="text-center text-[10px] font-semibold uppercase tracking-[3px] text-slate-700 pb-5 shrink-0">
    Bravo Protocol v4.2.1
  </p>

</div>

<script>
  function toggleBtn(key, iconOn, iconOff) {
    const btn  = document.getElementById('btn-' + key);
    const icon = document.getElementById('ico-' + key);
    const on   = btn.classList.toggle('active');
    icon.textContent = on ? iconOff : iconOn;
  }

  function goBack() {
    if (window.parent && window.parent.loadScreen) {
      const navItem = Array.from(window.parent.document.querySelectorAll('.nav-item'))
        .find(el => el.getAttribute('onclick') && el.getAttribute('onclick').includes('messenger-home'));
      window.parent.loadScreen('screens/messenger-home.html', navItem || window.parent.document.querySelector('.nav-item'));
    }
  }
</script>

</body></html>
