<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: { "primary": "#2563EB", "background-dark": "#0A0F1E" },
        fontFamily: { "display": ["Manrope", "sans-serif"] },
        borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
      },
    },
  }
</script>
<style>
  body { font-family: 'Manrope', sans-serif; height: 100dvh; overflow: hidden; }
  main::-webkit-scrollbar { display: none; }
  main { scrollbar-width: none; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="bg-background-dark font-display text-slate-100 h-screen flex flex-col">

  <!-- Header -->
  <header class="flex items-center p-4">
    <button class="flex items-center justify-center size-10 rounded-full hover:bg-primary/10 transition-colors">
      <span class="material-symbols-outlined text-slate-100">arrow_back</span>
    </button>
  </header>

  <!-- Main -->
  <main class="flex-1 px-6 pb-28 overflow-y-auto">
    <!-- Progress -->
    <div class="mb-4">
      <span class="text-xs font-medium text-primary block mb-1.5">Step 2 of 4</span>
      <div class="h-1 w-full bg-slate-800 rounded-full overflow-hidden">
        <div class="h-full bg-primary rounded-full w-1/2"></div>
      </div>
    </div>

    <!-- Heading -->
    <div class="mb-4">
      <h1 class="text-2xl font-bold mb-1">Who are you?</h1>
      <p class="text-slate-400 text-sm">Your role shapes your experience</p>
    </div>

    <!-- Role cards -->
    <div class="grid grid-cols-2 gap-4">

      <!-- Individual — selected -->
      <button class="flex flex-col text-left p-3 rounded-xl border-2 border-primary bg-primary/10 ring-1 ring-primary/20 transition-all">
        <div class="mb-2.5 bg-primary text-white rounded-lg size-10 flex items-center justify-center">
          <span class="material-symbols-outlined text-xl">shield</span>
        </div>
        <h3 class="font-bold text-sm mb-1">Individual</h3>
        <p class="text-[11px] text-slate-400 leading-tight">Personal protection and secure messaging</p>
      </button>

      <!-- Corporate -->
      <button class="flex flex-col text-left p-3 rounded-xl border-2 border-slate-700 bg-slate-900/50 hover:border-primary/50 transition-all">
        <div class="mb-2.5 bg-slate-800 text-primary rounded-lg size-10 flex items-center justify-center">
          <span class="material-symbols-outlined text-xl">corporate_fare</span>
        </div>
        <h3 class="font-bold text-sm mb-1">Corporate</h3>
        <p class="text-[11px] text-slate-400 leading-tight">Team-wide security and enterprise comms</p>
      </button>

      <!-- Agent / CPO -->
      <button class="flex flex-col text-left p-3 rounded-xl border-2 border-slate-700 bg-slate-900/50 hover:border-primary/50 transition-all">
        <div class="mb-2.5 bg-slate-800 text-primary rounded-lg size-10 flex items-center justify-center">
          <span class="material-symbols-outlined text-xl">badge</span>
        </div>
        <h3 class="font-bold text-sm mb-1">Agent / CPO</h3>
        <p class="text-[11px] text-slate-400 leading-tight">Receive jobs and manage security operations</p>
      </button>

      <!-- Ops Room -->
      <button class="flex flex-col text-left p-3 rounded-xl border-2 border-slate-700 bg-slate-900/50 hover:border-primary/50 transition-all">
        <div class="mb-2.5 bg-slate-800 text-primary rounded-lg size-10 flex items-center justify-center">
          <span class="material-symbols-outlined text-xl">headset_mic</span>
        </div>
        <h3 class="font-bold text-sm mb-1">Ops Room</h3>
        <p class="text-[11px] text-slate-400 leading-tight">Dispatch teams and monitor live operations</p>
      </button>

    </div>
  </main>

  <!-- Footer -->
  <footer class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-[#0A0F1E] via-[#0A0F1E] to-transparent">
    <button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 px-6 rounded-xl transition-colors shadow-lg shadow-primary/20">
      Continue
    </button>
  </footer>

</body></html>
